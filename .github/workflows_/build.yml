name: Build HTML to EXE

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            binary: myapp-linux_x64
            artifact: myapp-linux
          - os: windows-latest
            binary: myapp-win_x64.exe
            artifact: myapp-windows
          - os: macos-latest
            binary: myapp-mac_x64
            artifact: myapp-macos
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Neutralinojs CLI
        run: npm install -g @neutralinojs/neu

      - name: Download Neutralinojs binaries
        run: neu update

      - name: Build
        run: neu build --release

      - name: Upload artifacts (single exe)
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/myapp/${{ matrix.binary }}

      - name: Upload artifacts (release zip)
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}-zip
          path: dist/myapp-release.zip
